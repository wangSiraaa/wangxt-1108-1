<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游客 - 今日喷泉开放时间</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>🎪 城市广场喷泉 - 今日开放时间</h1>
            <a href="index.html" class="back-link">← 返回首页</a>
        </div>

        <div class="section">
            <div class="section-title">
                <span>📅 今日：<span id="todayDate"></span></span>
                <span id="currentTime" style="font-weight: normal; color: #666;"></span>
            </div>

            <div id="statusAlerts"></div>

            <div class="status-grid" style="margin-bottom: 20px;">
                <div class="status-item">
                    <span class="status-label">💧 喷泉状态：</span>
                    <span id="fountainStatus" class="status-value">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">🔧 设备状态：</span>
                    <span id="deviceStatus" class="status-value">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">🌤️ 天气：</span>
                    <span id="weatherStatus" class="status-value">-</span>
                </div>
                <div class="status-item">
                    <span class="status-label">💨 风力：</span>
                    <span id="windLevel" class="status-value">-</span>
                </div>
            </div>

            <h3 style="margin-bottom: 20px; color: #333;">🎬 今日开放场次</h3>

            <div class="visitor-timeline" id="timeline"></div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">💤</div>
                <div class="empty-state-text">今日暂无排程安排</div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>📋 开放须知</span>
            </div>
            <div style="line-height: 1.8; color: #555;">
                <p>1. 喷泉开放期间请注意安全，请勿靠近喷泉区域。</p>
                <p>2. 如遇大风、雷雨等恶劣天气，喷泉将自动停止开放。</p>
                <p>3. 设备维护期间，喷泉暂停开放，敬请谅解。</p>
                <p>4. 如遇特殊情况，开放时间可能临时调整，请以现场公告为准。</p>
                <p style="margin-top: 15px; color: #999; font-size: 14px;">
                    数据更新时间：<span id="lastUpdate"></span>
                    <button onclick="refreshData()" class="btn btn-sm btn-secondary" style="margin-left: 10px;">手动刷新</button>
                </p>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/visitor.js"></script>
</body>
</html>
